<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=dist/index.html">
  <title>Redirecting to BookOTS...</title>
  <style>
    body {
      background: #050614;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    .loader-ring {
      border: 4px solid rgba(255, 255, 255, 0.05);
      border-top: 4px solid #eab308;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    a {
      color: #eab308;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
  <script>
    window.location.href = "dist/index.html";
  </script>
</head>
<body>
  <div class="loader-ring"></div>
  <p style="font-size: 16px; letter-spacing: 0.05em; font-weight: 500;">Redirecting to BookOTS Taxi Service...</p>
  <p style="font-size: 12px; color: #64748b; margin-top: 10px;">If you are not redirected automatically, <a href="dist/index.html">click here</a>.</p>
</body>
</html>
